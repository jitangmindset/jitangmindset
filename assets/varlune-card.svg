<svg width="1200" height="250" viewBox="0 0 1200 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Varlune — local-first password manager for Windows</title>
  <defs>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#2B2B2B"/>
    </pattern>
    <clipPath id="card">
      <rect width="1200" height="250" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect width="1200" height="250" fill="#090909"/>
    <rect width="1200" height="250" fill="url(#dots)"/>
    <rect x="0.75" y="0.75" width="1198.5" height="248.5" rx="15.25" stroke="#3A3A3A" stroke-width="1.5"/>
    <rect x="0" width="7" height="250" fill="#F2F2F2"/>

    <g font-family="Segoe UI, Arial, sans-serif">
      <text x="56" y="57" fill="#777777" font-size="13" font-weight="700" letter-spacing="3">01 / FEATURED PROJECT</text>
      <text x="56" y="125" fill="#F4F4F4" font-size="52" font-weight="800" letter-spacing="-2">VARLUNE</text>
      <text x="56" y="163" fill="#A7A7A7" font-size="17" font-weight="500">A private vault built for the machine it lives on.</text>

      <rect x="56" y="191" width="112" height="30" rx="5" fill="#F2F2F2"/>
      <text x="112" y="211" fill="#080808" font-size="11" font-weight="800" letter-spacing="1.5" text-anchor="middle">LOCAL-FIRST</text>
      <rect x="178" y="191" width="98" height="30" rx="5" fill="#171717" stroke="#383838"/>
      <text x="227" y="211" fill="#D5D5D5" font-size="11" font-weight="800" letter-spacing="1.5" text-anchor="middle">WINDOWS</text>
      <rect x="286" y="191" width="104" height="30" rx="5" fill="#171717" stroke="#383838"/>
      <text x="338" y="211" fill="#D5D5D5" font-size="11" font-weight="800" letter-spacing="1.5" text-anchor="middle">ELECTRON</text>
    </g>

    <g transform="translate(925 35)">
      <rect width="180" height="180" rx="38" fill="#F2F2F2"/>
      <path d="M38 48H63L90 102L117 48H142L90 152L38 48Z" fill="#090909"/>
      <path d="M66 48H90L104 76L90 104L66 48Z" fill="#4A4A4A"/>
    </g>
  </g>
</svg>
